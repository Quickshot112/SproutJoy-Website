    .PU-Form {
      max-width: 800px;
      margin: 40px auto;
      border: 2px solid black;
      padding: 30px;
      background: #f9f9f9;
    }

    .PU-Form h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .PU-Form-Group {
      margin-bottom: 20px;
    }

    .PU-Form-Group label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .PU-Form-Group input,
    .PU-Form-Group textarea,
    .PU-Form-Group select {
      width: 100%;
      padding: 10px;
      border: 1px dotted black;
    }

    .PU-Form button {
      display: block;
      margin: 30px auto 0;
      padding: 10px 24px;
      font-size: 16px;
      border: 2px solid black;
      border-radius: 30px;
      background: white;
      cursor: pointer;
    }

    .PU-Form button:hover {
      background-color: black;
      color: white;
      transition: 0.3s;
    }
  </style>

  <main class="Content-Space">

    <div class="Title">
      <h1>Pop-Up Nanny Registration Form</h1>
    </div>
	
    <form class="PU-Form">
      <h2>Pop-Up Nanny Registration Form</h2>

      <div class="PU-Form-Group">
        <label>Parent Name</label>
        <input type="text" required>
      </div>

      <div class="PU-Form-Group">
        <label>Child Name</label>
        <input type="text" required>
      </div>

      <div class="PU-Form-Group">
        <label>Child Age</label>
        <input type="number" min="0" required>
      </div>

      <div class="PU-Form-Group">
        <label>Date Needed</label>
        <input type="date" required>
      </div>

      <div class="PU-Form-Group">
        <label>Time Range</label>
        <input type="text" placeholder="e.g., 9:00 AM – 5:00 PM" required>
      </div>

      <div class="PU-Form-Group">
        <label>Service Location</label>
        <input type="text" required>
      </div>

      <div class="PU-Form-Group">
        <label>Special Requirements</label>
        <textarea></textarea>
      </div>

      <button type="submit">Submit</button>
    </form>
